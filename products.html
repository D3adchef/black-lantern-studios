<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Lantern Studios | Products</title>
  <link rel="stylesheet" href="css/products.css" />
</head>
<body>

  <!-- 🔥 NAVBAR -->
  <nav class="global-nav">
    <a href="products.html">Products</a>
    <a href="games-worlds.html">Games & Worlds</a>
    <a href="studio-artist.html">Studio Artist</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="products-page">
    <div class="hotspot-layer">
      <button class="hotspot ghost-box" data-product="hauntsync" aria-label="Open HauntSync"></button>
      <button class="hotspot mug21-box" data-product="proof21" aria-label="Open Proof21"></button>
      <button class="hotspot bsharp-box" data-product="budbalance" aria-label="Open BudBalance"></button>
      <button class="hotspot leaf-box" data-product="cannalytics" aria-label="Open Cannalytics"></button>
      <button class="hotspot d20-box" data-product="habitaeffect" aria-label="Open Habit AEffect"></button>
    </div>

    <section class="product-card-wrap hidden" id="productCardWrap" aria-hidden="true">
      <div class="product-card-panel">
        <button class="close-card" id="closeCard" aria-label="Close product card">×</button>

        <p class="product-status" id="productStatus"></p>
        <h1 id="productTitle"></h1>
        <p class="product-description" id="productDescription"></p>

        <div class="product-links" id="productLinks"></div>

        <img class="product-symbol" id="productSymbol" alt="product symbol" />
      </div>
    </section>
  </main>

  <script>
    const productData = {
      hauntsync: {
        status: "In Development",
        title: "HauntSync",
        description:
          "A fully immersive AR app built for walking tours, haunted houses, escape rooms, and other live events where technology can bridge the gap between the physical space and the story unfolding around you.",
        links: []
      },
      proof21: {
        status: "In Development",
        title: "Proof21",
        description:
          "A door and ID verification platform designed for bars, venues, and nightlife operations. Proof21 is being developed to streamline age checks, entry control, payment flow, and accountability in one connected system.",
        links: []
      },
      budbalance: {
        status: "Live",
        title: "BudBalance",
        description:
          "A cannabis allotment tracking tool built to help users monitor purchases, understand rolling limits, and plan smarter. Live now on GitHub, with Apple App Store and Google Play rollout continuing through active testing and release preparation.",
        links: [
          {
            label: "Visit Site",
            url: "https://d3adchef.github.io/BudBalance/"
          }
        ]
      },
      cannalytics: {
        status: "In Development",
        title: "Cannalytics",
        description:
          "A cannabis intelligence and journal platform built to track product details, terpene profiles, THC data, and personal likes and dislikes. The long-term goal is smarter shopping guidance based on your preferences and the dispensary you are standing in.",
        links: []
      },
      habitaeffect: {
        status: "Live",
        title: "Habit AEffect",
        description:
          "A behavioral coaching platform led by Dr. Jen, a professor and habit coach who specializes in supporting individuals with neurodivergence-related challenges. Habit AEffect is designed to provide structure, guidance, and practical support for meaningful personal growth.",
        links: [
          {
            label: "Visit Site",
            url: "https://habitaeffect.com/"
          }
        ]
      }
    };

    const symbolMap = {
      hauntsync: "ghost.png",
      proof21: "proof21.png",
      budbalance: "b3.png",
      cannalytics: "leaf.png",
      habitaeffect: "d20.png"
    };

    const hotspots = document.querySelectorAll(".hotspot");
    const cardWrap = document.getElementById("productCardWrap");
    const closeCard = document.getElementById("closeCard");

    const productStatus = document.getElementById("productStatus");
    const productTitle = document.getElementById("productTitle");
    const productDescription = document.getElementById("productDescription");
    const productLinks = document.getElementById("productLinks");
    const productSymbol = document.getElementById("productSymbol");

    let isClosing = false;

    function populateCard(productKey) {
      const product = productData[productKey];
      if (!product) return;

      productStatus.textContent = product.status;
      productTitle.textContent = product.title;
      productDescription.textContent = product.description;

      productLinks.innerHTML = "";

      product.links.forEach((link) => {
        const a = document.createElement("a");
        a.href = link.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className = "product-link-btn";
        a.textContent = link.label;
        productLinks.appendChild(a);
      });

      productSymbol.src = `assets/${symbolMap[productKey]}`;
      productSymbol.alt = `${product.title} symbol`;
    }

    function openCard(productKey) {
      populateCard(productKey);

      cardWrap.classList.remove("hidden", "dematerialize");
      cardWrap.classList.add("materialize");
      cardWrap.setAttribute("aria-hidden", "false");
      isClosing = false;
    }

    function closeProductCard() {
      if (cardWrap.classList.contains("hidden") || isClosing) return;

      isClosing = true;
      cardWrap.classList.remove("materialize");
      cardWrap.classList.add("dematerialize");
      cardWrap.setAttribute("aria-hidden", "true");

      setTimeout(() => {
        cardWrap.classList.add("hidden");
        cardWrap.classList.remove("dematerialize");
        isClosing = false;
      }, 950);
    }

    hotspots.forEach((hotspot) => {
      hotspot.addEventListener("click", () => {
        const productKey = hotspot.dataset.product;
        openCard(productKey);
      });
    });

    closeCard.addEventListener("click", closeProductCard);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeProductCard();
      }
    });
  </script>
</body>
</html>
