<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Lantern Studios</title>
  <link rel="stylesheet" href="css/home.css" />
</head>

<body>

  <!-- Background scene -->
  <div class="scene"></div>

  <!-- Spray-painted title overlay -->
  <div class="spray-title"></div>

  <!-- Darkness overlay -->
  <div class="darkness"></div>

  <!-- Lantern glow -->
  <div class="lantern-light"></div>

  <!-- Invisible clickable hotspots -->
  <div class="hotspots" aria-hidden="true">

    <!-- PRODUCTS -->
    <a class="hotspot rect"
       href="products.html"
       aria-label="Products"
       style="--x1: 7.01%; --x2: 24.32%; --y1: 45.77%; --y2: 53.68%;"></a>

    <!-- GAMES & WORLDS -->
    <a class="hotspot rect"
       href="games-worlds.html"
       aria-label="Games & Worlds"
       style="--x1: 9.50%; --x2: 34.26%; --y1: 58.90%; --y2: 65.50%;"></a>

    <!-- STUDIO ARTIST (lowered slightly for buffer space) -->
    <a class="hotspot rect"
       href="studio-artist.html"
       aria-label="Studio Artist"
       style="--x1: 21.48%; --x2: 39.01%; --y1: 68.00%; --y2: 76.00%;"></a>

    <!-- ABOUT -->
    <a class="hotspot rect"
       href="about.html"
       aria-label="About"
       style="--x1: 75%; --x2: 85%; --y1: 32%; --y2: 40%;"></a>

    <!-- CONTACT -->
    <a class="hotspot rect"
       href="contact.html"
       aria-label="Contact"
       style="--x1: 75%; --x2: 88.5%; --y1: 50%; --y2: 58%;"></a>

  </div>

  <script src="js/home-intro.js"></script>
</body>
</html>
